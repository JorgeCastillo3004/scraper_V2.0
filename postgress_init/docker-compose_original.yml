version: '3'

services:
  postgres-sports:
    image: postgres:16.1
    container_name: sports_container
    environment:
      POSTGRES_DB: sports_db
      POSTGRES_USER: DB_USER
      POSTGRES_PASSWORD: DB_PASS
    ports:
      - "5432:5432"
    volumes:
      - ./db-DDL.sql:/docker-entrypoint-initdb.d/db-DDL.sql
      - ./Data/sports:/var/lib/postgresql/data
